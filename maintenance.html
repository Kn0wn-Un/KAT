<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAT Studio</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0e0e0e, #1a1a1a);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    .logo {
      font-size: 64px;
      font-weight: 600;
      letter-spacing: 10px;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 14px;
      opacity: 0.6;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .headline {
      font-size: 26px;
      margin-bottom: 15px;
    }

    .subtext {
      font-size: 15px;
      opacity: 0.6;
      margin-bottom: 35px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 12px 30px;
      border: 1px solid #ffffff;
      color: #ffffff;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 1px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ffffff;
      color: #000000;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.3;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="logo">KAT</div>
    <div class="tagline">ARCHITECTURAL VISUALIZATION</div>

    <div class="headline">We’re building something powerful.</div>

    <div class="subtext">
      Our platform is currently being refined to deliver high-end architectural visuals,
      immersive walkthroughs, and next-generation presentation experiences.
      <br><br>
      We’ll be live soon.
    </div>

    <!-- 🔥 CHANGE THIS LINK -->
    <a href="https://instagram.com/YOUR_USERNAME" target="_blank" class="btn">
      VIEW OUR WORK
    </a>

    <div class="footer">
      © 2026 KAT Studio
    </div>

  </div>
</body>
</html>
