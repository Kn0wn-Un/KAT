<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAT Studio</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    /* Glass Card */
    .glass {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 50px 40px;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-align: center;
      width: 350px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    /* Logo */
    .logo {
      width: 120px;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 10px 24px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      font-size: 13px;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

  <div class="glass">

    <!-- 🔥 YOUR LOGO -->
    <img src="logo.png" alt="KAT Logo" class="logo">

    <h1>COMING SOON</h1>

    <p>
      We’re crafting high-end architectural visualizations.<br>
      Something powerful is on the way.
    </p>

    <!-- 🔥 CHANGE THIS LINK -->
    <a href="https://instagram.com/YOUR_USERNAME" target="_blank" class="btn">
      VIEW WORK
    </a>

  </div>

</body>
</html>
